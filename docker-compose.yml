services:
  db:
    image: postgres:16-alpine
    container_name: railway-monitoring-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: railway_monitoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d railway_monitoring"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: railway-monitoring-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "3000"
      CORS_ORIGIN: "*"
      JWT_SECRET: demo-secret-key-change-in-production
      JWT_EXPIRES_IN: 24h
      DEVICE_TOKEN_SECRET: device-token-secret-change-in-production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: railway_monitoring
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSL: "false"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
