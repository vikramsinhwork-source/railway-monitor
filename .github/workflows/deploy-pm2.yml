name: Deploy Railway Monitoring

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Self-Hosted Server
    runs-on: [self-hosted]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Restart PM2
        run: |
          pm2 restart railway-monitoring --update-env

      - name: Save PM2
        run: pm2 save

      - name: Verify
        run: pm2 status
